# 相机配置文件

# 主工业相机类型：hikrobot / mindvision 等。
camera_name = "hikrobot"

# 主工业相机曝光时间，单位 ms。
exposure_ms = 5

# 主工业相机增益。
gain = 10.0

# 工业相机 VID:PID，用于识别设备。
vid_pid = "2bdf:0001"

# 云台坐标系到 IMU body 坐标系的旋转矩阵，按行展开。
R_gimbal2imubody = [
    1, 0, 0,
    0, 1, 0,
    0, 0, 1
]

# 工业相机内参矩阵，按行展开。
# 重投影误差: 0.1944px
camera_matrix = [
    1295.4665175006589, 0, 655.71498478800618,
    0, 1297.2591156991834, 506.21320670125334,
    0, 0, 1
]

# 工业相机畸变参数: k1, k2, p1, p2, k3。
distort_coeffs = [
    -0.48599095566724387,
    0.23999516531343185,
    -0.00029018466701866776,
    -0.00083639963030895752,
    0
]

# 相机坐标系到云台坐标系的旋转矩阵，按行展开。
# 相机同理想情况的偏角: yaw-2.64 pitch-3.20 roll-0.77 degree
R_camera2gimbal = [
    0.046736929626455238, -0.055211941324114208, 0.99738021884550865,
    -0.99881598162461238, -0.016078770676278314, 0.0459141370909011,
    0.013501639172863072, -0.99834518813322415, -0.055898041744621867
]

# 相机坐标系到云台坐标系的平移向量，单位通常为 m。
t_camera2gimbal = [
    0.27420934670256336,
    0.0098763306562371159,
    0.043798385984197351
]

# USB 辅助相机图像宽高。
image_width = 1920
image_height = 1080

# USB 辅助相机水平/垂直视场角，单位 degree。
fov_h = 87.7
fov_v = 56.7

# USB 辅助相机帧率和曝光参数。
usb_frame_rate = 60
usb_exposure = 250
usb_gamma = 160
usb_gain = 10